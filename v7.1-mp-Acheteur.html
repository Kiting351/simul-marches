        function App() {
          const [gameState, setGameState] = useState('home');
          const [currentStepIndex, setCurrentStepIndex] = useState(0);
          const [score, setScore] = useState(100);
          const [errorsList, setErrorsList] = useState([]);
          const [feedback, setFeedback] = useState(null);
          const [stats, setStats] = useState({ correct: 0, wrong: 0 });

          const currentStep = useMemo(() => SCENARIO_DATA[currentStepIndex], [currentStepIndex]);

          const startGame = () => {
            setGameState('playing');
            setCurrentStepIndex(0);
            setScore(100);
            setErrorsList([]);
            setFeedback(null);
            setStats({ correct: 0, wrong: 0 });
          };

          const handleChoice = (choice) => {
            setFeedback({
              text: choice.feedback,
              isCorrect: choice.isCorrect,
              article: choice.article
            });

            if (!choice.isCorrect) {
              setScore(prev => Math.max(0, prev - (choice.penalty || 10)));
              setErrorsList(prev => [...prev, {
                step: currentStep.title,
                msg: choice.feedback,
                art: choice.article
              }]);
              setStats(s => ({ ...s, wrong: s.wrong + 1 }));
            } else {
              setStats(s => ({ ...s, correct: s.correct + 1 }));
            }
          };

          const nextStep = () => {
            setFeedback(null);
            if (currentStepIndex < SCENARIO_DATA.length - 1) {
              setCurrentStepIndex(prev => prev + 1);
            } else {
              setGameState('end');
            }
          };

          const renderHome = () => (
            <div className="max-w-4xl mx-auto p-10 bg-white rounded-3xl shadow-xl border border-slate-200 text-center space-y-8 animate-fade-in mt-12">
              <div className="inline-flex p-5 bg-blue-50 rounded-full text-blue-600 mb-2">
                <FaIcon icon="landmark-flag" className="text-4xl" />
              </div>
              <h1 className="text-5xl font-black text-slate-800 tracking-tight">Simul-Marchés <span className="text-blue-600 italic font-medium text-2xl ml-2">Expert v7.1</span></h1>
              <p className="text-xl text-slate-500 max-w-2xl mx-auto leading-relaxed">
                Formation immersive sur le <b>Décret n°2014-1039</b>. Testez vos connaissances sur l'intégralité du cycle de vie des marchés publics.
              </p>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-left">
                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                  <FaIcon icon="list-check" className="text-blue-500 mb-2" />
                  <h3 className="font-bold">{SCENARIO_DATA.length} Scénarios</h3>
                  <p className="text-xs text-slate-500">De la préparation à l'audit final.</p>
                </div>
                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                  <FaIcon icon="gavel" className="text-orange-500 mb-2" />
                  <h3 className="font-bold">100% Juridique</h3>
                  <p className="text-xs text-slate-500">Références directes aux articles.</p>
                </div>
                <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                  <FaIcon icon="user-shield" className="text-green-500 mb-2" />
                  <h3 className="font-bold">Certifiant</h3>
                  <p className="text-xs text-slate-500">Analysez votre conformité.</p>
                </div>
              </div>

              <div className="flex flex-col sm:flex-row justify-center gap-4 pt-6">
                <button onClick={startGame} className="px-10 py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg transition-all hover:-translate-y-1">
                  Lancer le parcours complet
                </button>
                <button onClick={() => setGameState('teacher')} className="px-10 py-5 bg-white border-2 border-slate-200 hover:border-slate-300 text-slate-600 rounded-2xl font-bold text-lg transition-all">
                  Ressources
                </button>
              </div>
            </div>
          );

          const renderPlaying = () => (
            <div className="max-w-5xl mx-auto px-4 py-8 space-y-6">
              <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-wrap justify-between items-center">
                <div className="flex items-center gap-8">
                  <div>
                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Santé Juridique</span>
                    <div className="flex items-center gap-2">
                        <div className="h-3 w-32 bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-500 transition-all duration-700" style={{width: `${score}%`}}></div>
                        </div>
                        <span className="font-black text-blue-600">{score}%</span>
                    </div>
                  </div>
                  <div>
                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Étape</span>
                    <div className="text-lg font-bold text-slate-700">{currentStepIndex + 1} / {SCENARIO_DATA.length}</div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <div className="px-4 py-2 bg-green-50 text-green-700 rounded-xl text-xs font-bold border border-green-100">
                    <FaIcon icon="check" className="mr-1" /> {stats.correct}
                  </div>
                  <div className="px-4 py-2 bg-red-50 text-red-700 rounded-xl text-xs font-bold border border-red-100">
                    <FaIcon icon="xmark" className="mr-1" /> {stats.wrong}
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-200 animate-slide-up">
                <div className="p-10">
                  <div className="flex justify-between items-start mb-6">
                    <span className="px-4 py-1 bg-blue-100 text-blue-700 text-[10px] font-black uppercase tracking-widest rounded-full">
                      {currentStep.category}
                    </span>
                    <span className="text-slate-300 font-mono italic">#{currentStep.id}</span>
                  </div>

                  <h2 className="text-3xl font-black text-slate-800 mb-6 leading-tight">{currentStep.title}</h2>
                  
                  <div className="p-6 bg-slate-50 rounded-3xl border border-slate-100 mb-8 relative">
                    <FaIcon icon="quote-left" className="absolute -top-3 -left-1 text-slate-200 text-4xl" />
                    <p className="text-lg text-slate-600 font-medium leading-relaxed italic">"{currentStep.context}"</p>
                  </div>

                  <div className="space-y-4">
                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-start">
                       <span className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center mr-3 text-sm shrink-0">?</span>
                       {currentStep.question}
                    </h3>
                    
                    <div className="grid grid-cols-1 gap-4">
                      {!feedback && currentStep.choices.map((choice, idx) => (
                        <button key={idx} onClick={() => handleChoice(choice)} className="group flex items-center text-left p-5 border-2 border-slate-100 rounded-[1.5rem] hover:border-blue-500 hover:bg-blue-50 transition-all">
                          <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-lg font-black text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all mr-6">
                            {String.fromCharCode(65 + idx)}
                          </div>
                          <span className="text-lg font-bold text-slate-700">{choice.text}</span>
                        </button>
                      ))}
                    </div>

                    {feedback && (
                      <div className={`mt-8 p-8 rounded-[2rem] border-4 animate-fade-in ${feedback.isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-rose-50 border-rose-100'}`}>
                        <div className="flex flex-col md:flex-row items-start gap-6">
                          <div className={`p-4 rounded-2xl ${feedback.isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                             <FaIcon icon={feedback.isCorrect ? 'check-double' : 'triangle-exclamation'} className="text-2xl" />
                          </div>
                          <div className="flex-1">
                            <h4 className={`text-2xl font-black mb-3 ${feedback.isCorrect ? 'text-emerald-800' : 'text-rose-800'}`}>
                              {feedback.isCorrect ? 'Décision Réglementaire' : 'Alerte Non-Conformité'}
                            </h4>
                            <p className="text-lg text-slate-700 leading-relaxed mb-6">{feedback.text}</p>
                            <div className="inline-flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm border border-slate-200 font-black text-xs text-slate-500 uppercase">
                              Référence : {feedback.article}
                            </div>
                          </div>
                        </div>
                        <div className="mt-8 flex justify-end">
                            <button onClick={nextStep} className="px-10 py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-black flex items-center gap-3">
                                {currentStepIndex < SCENARIO_DATA.length - 1 ? 'Suivant' : 'Voir le bilan'} <FaIcon icon="arrow-right" />
                            </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );

          const renderEnd = () => (
            <div className="max-w-4xl mx-auto p-12 bg-white rounded-[3rem] shadow-2xl animate-fade-in mt-12 text-center border border-slate-200">
              <h1 className="text-5xl font-black text-slate-800 mb-12">Bilan de Conformité</h1>

              <div className="flex flex-col items-center mb-12">
                 <div className="relative w-48 h-48 flex items-center justify-center mb-6">
                    <svg className="w-full h-full transform -rotate-90">
                        <circle cx="96" cy="96" r="80" stroke="currentColor" strokeWidth="12" fill="transparent" className="text-slate-100" />
                        <circle cx="96" cy="96" r="80" stroke="currentColor" strokeWidth="12" fill="transparent" 
                                className={`${score >= 70 ? 'text-emerald-500' : 'text-rose-500'} transition-all duration-1000`}
                                strokeDasharray={502.4} strokeDashoffset={502.4 - (502.4 * score / 100)} />
                    </svg>
                    <span className="absolute text-5xl font-black">{score}%</span>
                 </div>
                 <h2 className={`text-2xl font-black uppercase tracking-widest ${score >= 70 ? 'text-emerald-600' : 'text-rose-600'}`}>
                    {score >= 90 ? "Expert Certifié" : score >= 70 ? "Praticien Confirmé" : "Niveau Insuffisant"}
                 </h2>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left mb-12">
                  <div className="bg-slate-50 p-8 rounded-[2rem]">
                    <h3 className="font-black text-slate-800 mb-4 flex items-center">Score: {stats.correct}/{SCENARIO_DATA.length} correct</h3>
                    <p className="text-slate-600 font-medium">Vous avez parcouru l'intégralité des {SCENARIO_DATA.length} points de contrôle du décret.</p>
                  </div>
                  <div className="bg-rose-50 p-8 rounded-[2rem] border border-rose-100">
                    <h3 className="font-black text-rose-800 mb-4">Articles à revoir</h3>
                    <div className="max-h-40 overflow-y-auto pr-2 space-y-2 text-sm custom-scrollbar">
                        {errorsList.length === 0 ? "Aucun ! Maîtrise parfaite." : errorsList.map((e, i) => (
                            <div key={i} className="border-b border-rose-100 pb-1">
                                <span className="font-bold">{e.art}</span>: {e.step}
                            </div>
                        ))}
                    </div>
                  </div>
              </div>

              <button onClick={startGame} className="px-12 py-5 bg-slate-900 text-white rounded-2xl font-black transition-all hover:scale-105">
                Recommencer le cycle
              </button>
            </div>
          );

          const renderTeacher = () => (
            <div className="max-w-4xl mx-auto p-12 bg-white rounded-[3rem] shadow-xl animate-fade-in mt-12 border border-slate-200">
                <button onClick={() => setGameState('home')} className="text-slate-400 hover:text-slate-600 font-bold mb-8 flex items-center">
                    <FaIcon icon="arrow-left" className="mr-2" /> Retour
                </button>
                <h2 className="text-4xl font-black text-slate-800 mb-8 tracking-tighter">Documentation Expert</h2>
                <div className="space-y-6 text-slate-600 leading-relaxed">
                    <p>Ce simulateur couvre les 4 grandes phases du décret n°2014-1039 :</p>
                    <ul className="list-disc pl-6 space-y-2">
                        <li><b>Préparation :</b> Planification, Allotissement, Estimation, Spécifications.</li>
                        <li><b>Passation :</b> Publicité, Ouverture, Analyse, Attribution, Préférence Nationale.</li>
                        <li><b>Exécution :</b> Cautions, Avenants, Sous-traitance, Pénalités.</li>
                        <li><b>Gouvernance :</b> HAICOP, CSERP, Audit et Contrôle des commissions.</li>
                    </ul>
                    <div className="p-6 bg-blue-50 rounded-2xl border border-blue-100 mt-8 font-medium">
                        Dernière mise à jour conforme à la réglementation 2014 et ses textes d'application récents.
                    </div>
                </div>
            </div>
          );

          return (
            <div className="min-h-screen">
              <header className="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 py-4 px-8">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl">S</div>
                    <div>
                        <h1 className="font-black text-slate-800 leading-none">Simul-Marchés</h1>
                        <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest">Tunisia Expert</span>
                    </div>
                  </div>
                  <div className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">
                    {SCENARIO_DATA.length} Scénarios Pédagogiques
                  </div>
                </div>
              </header>

              <main>
                {gameState === 'home' && renderHome()}
                {gameState === 'playing' && renderPlaying()}
                {gameState === 'end' && renderEnd()}
                {gameState === 'teacher' && renderTeacher()}
              </main>

              <footer className="py-10 text-center text-slate-400 text-xs">
                © {new Date().getFullYear()} - Conforme au Décret n°2014-1039 du 13 mars 2014.
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
