                        text: "Seulement à la fin des travaux du candidat gagnant.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : Votre caution ne peut être retenue en otage. Seul l'attributaire maintient sa garantie jusqu'à la caution définitive.",
                        article: "Art. 104"
                    }
                ]
            },
            {
                id: 22,
                category: "EXÉCUTION",
                title: "Caution définitive",
                context: "Bravo, vous êtes l'attributaire du marché ! Le contrat vous est notifié officiellement.",
                question: "Dans quel délai devez-vous constituer la caution définitive (max 3%) ?",
                choices: [
                    {
                        text: "Dans les 20 jours suivant la notification de l'approbation du marché.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "OBLIGATION : L'Art. 105 régit la caution définitive. Attention, le délai de 20 jours (Art. 76) correspond au délai maximal pour la restitution de votre caution provisoire APRÈS constitution de la caution définitive, et non au délai légal strict pour la constituer.",
                        article: "Art. 76 & 105"
                    },
                    {
                        text: "Je peux la fournir au moment du premier paiement de facture.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "RISQUE DE RÉSILIATION : Le marché sera annulé et votre caution provisoire saisie si la caution définitive n'est pas fournie dans les temps fixés.",
                        article: "Art. 76 & 105"
                    }
                ]
            },
            {
                id: 23,
                category: "EXÉCUTION",
                title: "Avances",
                context: "Le marché est signé, mais vous avez besoin de trésorerie pour acheter les matériaux et démarrer le chantier.",
                question: "Avez-vous droit à une avance ?",
                choices: [
                    {
                        text: "Oui, je peux demander l'avance prévue au contrat (généralement 10% à 20%) contre une caution bancaire de restitution d'avance.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "DROIT DU SOUMISSIONNAIRE : Les avances (sur commande, sur approvisionnement) sont un droit si elles sont prévues, moyennant une garantie équivalente.",
                        article: "Art. 92"
                    },
                    {
                        text: "Non, dans les marchés publics, on n'est payé qu'après service fait.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : Pour soulager la trésorerie des entreprises, le décret prévoit explicitement un système d'avances.",
                        article: "Art. 92"
                    }
                ]
            },
            {
                id: 24,
                category: "EXÉCUTION",
                title: "Retenue de garantie",
                context: "L'acheteur retient 10% sur chacune de vos factures au titre de la retenue de garantie, ce qui assèche votre trésorerie.",
                question: "Pouvez-vous éviter ces ponctions ?",
                choices: [
                    {
                        text: "Oui, je peux remplacer cette retenue par une caution bancaire personnelle et solidaire du même montant.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "FACULTÉ ENCADRÉE : Vous avez le droit de substituer une garantie bancaire à la retenue de garantie (Art. 112) pour préserver votre liquidité.",
                        article: "Art. 109-110 & 112"
                    },
                    {
                        text: "Non, la retenue sur facture est incontournable jusqu'à la réception définitive.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : Le code permet expressément la substitution par une garantie bancaire pour ne pas pénaliser l'entreprise.",
                        article: "Art. 109-110 & 112"
                    }
                ]
            },
            {
                id: 25,
                category: "EXÉCUTION",
                title: "Sous-traitance en cours de marché",
                context: "Pendant l'exécution, vous souhaitez confier une partie des travaux à une autre entreprise (sous-traitant) que vous n'aviez pas déclarée dans votre offre.",
                question: "Comment procéder ?",
                choices: [
                    {
                        text: "Je dois obligatoirement demander l'agrément préalable de l'acheteur public sur l'identité et les conditions de paiement de ce sous-traitant.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "OBLIGATION : La sous-traitance est possible, mais l'acheteur doit l'approuver formellement. Le sous-traitant peut alors bénéficier du paiement direct.",
                        article: "Art. 88"
                    },
                    {
                        text: "Je m'arrange directement avec mon sous-traitant, l'acheteur n'a de lien contractuel qu'avec moi.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "INTERDICTION : Une sous-traitance occulte est une cause de résiliation aux torts de l'entrepreneur.",
                        article: "Art. 88"
                    }
                ]
            },
            {
                id: 26,
                category: "EXÉCUTION",
                title: "Force Majeure",
                context: "Une inondation exceptionnelle et imprévisible détruit votre chantier, entraînant 2 mois de retard.",
                question: "Devrez-vous payer les pénalités de retard ?",
                choices: [
                    {
                        text: "Non, si je notifie la force majeure par écrit dans les délais, je serai exonéré des pénalités pour cette période.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "DROIT DU SOUMISSIONNAIRE : Le décret (Art. 171) organise les pénalités. L'exonération pour force majeure n'est pas codifiée textuellement dans le décret mais relève du droit commun des obligations. Il faut notifier et prouver l'événement rapidement.",
                        article: "Art. 171 & Droit commun"
                    },
                    {
                        text: "Oui, l'entreprise assume tous les risques météorologiques sans exception.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : Si les conditions de la force majeure (imprévisible, irrésistible) sont réunies, le droit commun vous protège contre l'application des pénalités de retard prévues au marché.",
                        article: "Art. 171 & Droit commun"
                    }
                ]
            },
            {
                id: 27,
                category: "EXÉCUTION",
                title: "Retard de paiement",
                context: "Vous avez livré les fournitures et déposé votre facture conforme, mais l'acheteur tarde à vous payer (plus de 45 jours).",
                question: "Quels sont vos droits ?",
                choices: [
                    {
                        text: "J'ai droit au paiement d'intérêts moratoires pour retard de paiement.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "DROIT DU SOUMISSIONNAIRE : Le retard de l'administration dans l'ordonnancement ou le paiement ouvre droit, de plein droit, à des intérêts moratoires.",
                        article: "Art. 101"
                    },
                    {
                        text: "Je n'ai aucun droit, l'administration paie quand les fonds sont disponibles.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : Le décret protège les entreprises contre les délais de paiement abusifs de l'Etat.",
                        article: "Art. 101"
                    }
                ]
            },
            {
                id: 28,
                category: "LITIGES & RECOURS",
                title: "Recours gracieux",
                context: "Votre offre a été rejetée et, après avoir demandé les motifs, vous estimez que l'acheteur a commis une erreur de droit flagrante dans l'évaluation.",
                question: "Quelle est votre première étape de contestation ?",
                choices: [
                    {
                        text: "Adresser un recours gracieux motivé au représentant légal de l'acheteur public dans les 5 jours de la notification.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "DROIT DU SOUMISSIONNAIRE : Le recours gracieux est la première étape (souvent pendant le délai de standstill) pour tenter de faire rectifier la décision.",
                        article: "Art. 180"
                    },
                    {
                        text: "Saisir immédiatement le Tribunal Administratif.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "MAUVAISE STRATÉGIE : Bien que possible, il est légalement prévu et bien plus rapide d'utiliser le recours gracieux puis le COSEM.",
                        article: "Art. 180"
                    }
                ]
            },
            {
                id: 29,
                category: "LITIGES & RECOURS",
                title: "Saisine du COSEM",
                context: "L'acheteur a rejeté votre recours gracieux. Vous souhaitez faire appel à l'instance de contrôle supérieure (le COSEM).",
                question: "Quel est l'effet de votre saisine du COSEM ?",
                choices: [
                    {
                        text: "Elle suspend la signature du marché jusqu'à ce que le Comité se prononce.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "DROIT DU SOUMISSIONNAIRE : Saisir le Comité de Suivi et d'Enquête (COSEM) dans les délais a un effet suspensif, protégeant vos droits avant l'irréparable.",
                        article: "Art. 181"
                    },
                    {
                        text: "L'acheteur peut ignorer cette saisine et signer le contrat quand même.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : L'effet suspensif est une garantie fondamentale du soumissionnaire, sauf urgence impérieuse certifiée.",
                        article: "Art. 181"
                    }
                ]
            },
            {
                id: 30,
                category: "LITIGES & RECOURS",
                title: "Résiliation aux torts",
                context: "Vous avez pris beaucoup de retard sur le chantier. L'acheteur décide de résilier le contrat à vos torts exclusifs.",
                question: "L'acheteur peut-il rompre le contrat sans préavis ?",
                choices: [
                    {
                        text: "Non, il doit obligatoirement m'adresser une mise en demeure préalable m'accordant un délai pour remédier aux défaillances.",
                        isCorrect: true,
                        penalty: 0,
                        feedback: "DROIT DU SOUMISSIONNAIRE : La mise en demeure préalable (généralement 10 à 15 jours) est obligatoire pour vous permettre de vous défendre ou de rectifier le tir.",
                        article: "Art. 119"
                    },
                    {
                        text: "Oui, la puissance publique peut résilier unilatéralement un contrat à tout moment.",
                        isCorrect: false,
                        penalty: 10,
                        feedback: "FAUX : La résiliation aux torts est une sanction grave qui exige le respect d'une procédure contradictoire stricte.",
                        article: "Art. 119"
                    }
                ]
            }
        ];

        function App() {
            const [gameState, setGameState] = React.useState('home'); 
            const [currentScenarioIndex, setCurrentScenarioIndex] = React.useState(0);
            const [score, setScore] = React.useState(100);
            const [results, setResults] = React.useState([]);
            const [showFeedback, setShowFeedback] = React.useState(false);
            const [selectedChoice, setSelectedChoice] = React.useState(null);

            const startSimulation = () => {
                setGameState('playing');
                setCurrentScenarioIndex(0);
                setScore(100);
                setResults([]);
                setShowFeedback(false);
                setSelectedChoice(null);
            };

            const handleChoice = (choiceIndex) => {
                if (showFeedback) return;
                
                const scenario = SCENARIO_DATA[currentScenarioIndex];
                const choice = scenario.choices[choiceIndex];
                
                setSelectedChoice(choiceIndex);
                setScore(prev => Math.max(0, prev - choice.penalty));
                
                setResults(prev => [...prev, {
                    scenarioId: scenario.id,
                    isCorrect: choice.isCorrect,
                    penalty: choice.penalty
                }]);
                
                setShowFeedback(true);
            };

            const nextScenario = () => {
                if (currentScenarioIndex < SCENARIO_DATA.length - 1) {
                    setCurrentScenarioIndex(prev => prev + 1);
                    setShowFeedback(false);
                    setSelectedChoice(null);
                } else {
                    setGameState('end');
                }
            };

            const renderHome = () => (
                <div className="flex flex-col items-center justify-center min-h-[80vh] px-4 animate-fade-in">
                    <div className="glass-panel p-10 rounded-3xl shadow-2xl max-w-2xl text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
                        <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <i className="fa-solid fa-briefcase text-4xl"></i>
                        </div>
                        <h1 className="text-4xl font-black text-slate-800 mb-4 tracking-tight">
                            Simul-Marchés <br/>
                            <span className="text-blue-600 text-3xl">Parcours Soumissionnaire</span>
                        </h1>
                        <p className="text-slate-600 text-lg mb-8 leading-relaxed">
                            Mettez-vous dans la peau d'un opérateur économique. Évaluez vos droits, vos obligations et les risques lors de la soumission à un marché public tunisien.
                        </p>
                        <div className="flex gap-4 justify-center">
                            <button 
                                onClick={startSimulation}
                                className="px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
                            >
                                <i className="fa-solid fa-play mr-2"></i> Démarrer la simulation
                            </button>
                            <button 
                                onClick={() => setGameState('teacher')}
                                className="px-8 py-4 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 rounded-xl font-bold text-lg shadow-sm hover:shadow-md transition-all duration-300"
                            >
                                <i className="fa-solid fa-book-open mr-2"></i> Mode Révision
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderPlaying = () => {
                const scenario = SCENARIO_DATA[currentScenarioIndex];
                const progress = ((currentScenarioIndex) / SCENARIO_DATA.length) * 100;

                return (
                    <div className="max-w-4xl mx-auto p-4 md:p-8 animate-fade-in h-[calc(100vh-80px)] flex flex-col">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-4">
                                <div className="bg-white px-4 py-2 rounded-lg font-bold text-slate-600 shadow-sm border border-slate-100">
                                    Cas {currentScenarioIndex + 1} / {SCENARIO_DATA.length}
                                </div>
                                <span className="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-md text-sm font-bold uppercase tracking-wide">
                                    {scenario.category}
                                </span>
                            </div>
                            <div className="bg-white px-5 py-2 rounded-xl shadow-sm border border-slate-100 flex items-center gap-3">
                                <span className="text-slate-500 font-medium">Santé Entreprise</span>
                                <div className="flex items-center gap-2">
                                    <div className="w-32 h-3 bg-slate-200 rounded-full overflow-hidden">
                                        <div 
                                            className={`h-full rounded-full transition-all duration-500 ${score > 70 ? 'bg-emerald-500' : score > 40 ? 'bg-amber-500' : 'bg-red-500'}`}
                                            style={{ width: `${score}%` }}
                                        ></div>
                                    </div>
                                    <span className={`font-black text-lg ${score > 70 ? 'text-emerald-600' : score > 40 ? 'text-amber-600' : 'text-red-600'}`}>
                                        {score}%
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div className="w-full bg-slate-200 h-1.5 rounded-full mb-8 overflow-hidden">
                            <div className="bg-blue-500 h-full transition-all duration-300 ease-out" style={{ width: `${progress}%` }}></div>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-20">
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 mb-6 relative overflow-hidden animate-slide-up">
                                <div className="absolute top-0 left-0 w-2 h-full bg-blue-500"></div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-4">{scenario.title}</h2>
                                <div className="bg-slate-50 p-5 rounded-xl border border-slate-100 mb-6">
                                    <p className="text-slate-700 text-lg leading-relaxed">{scenario.context}</p>
                                </div>
                                <p className="font-bold text-slate-800 text-xl mb-6">
                                    <i className="fa-solid fa-circle-question text-blue-500 mr-2"></i>
                                    {scenario.question}
                                </p>

                                <div className="grid gap-4">
                                    {scenario.choices.map((choice, idx) => (
                                        <button
                                            key={idx}
                                            onClick={() => handleChoice(idx)}
                                            disabled={showFeedback}
                                            className={`text-left p-5 rounded-xl border-2 transition-all duration-200 text-lg
                                                ${showFeedback 
                                                    ? (idx === selectedChoice 
                                                        ? (choice.isCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-900' : 'bg-red-50 border-red-500 text-red-900')
                                                        : (choice.isCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-900 opacity-50' : 'bg-white border-slate-100 opacity-50')
                                                      )
                                                    : 'bg-white border-slate-200 hover:border-blue-400 hover:bg-blue-50 hover:shadow-md cursor-pointer'
                                                }`}
                                        >
                                            <div className="flex items-start gap-4">
                                                <div className={`mt-1 flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center
                                                    ${showFeedback
                                                        ? (idx === selectedChoice
                                                            ? (choice.isCorrect ? 'border-emerald-500 bg-emerald-500 text-white' : 'border-red-500 bg-red-500 text-white')
                                                            : (choice.isCorrect ? 'border-emerald-500 text-emerald-500' : 'border-slate-300')
                                                          )
                                                        : 'border-slate-300'
                                                    }`}
                                                >
                                                    {showFeedback && idx === selectedChoice && (
                                                        <i className={`fa-solid ${choice.isCorrect ? 'fa-check' : 'fa-xmark'} text-xs`}></i>
                                                    )}
                                                </div>
                                                <span>{choice.text}</span>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {showFeedback && (
                                <div className="animate-slide-up bg-white rounded-2xl shadow-lg border-2 border-slate-800 p-8 relative overflow-hidden">
                                    <div className="flex items-start gap-6">
                                        <div className={`w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 shadow-inner
                                            ${scenario.choices[selectedChoice].isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`}>
                                            <i className={`fa-solid ${scenario.choices[selectedChoice].isCorrect ? 'fa-scale-balanced' : 'fa-gavel'} text-3xl`}></i>
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex items-center justify-between mb-2">
                                                <h3 className="text-xl font-black text-slate-800">Analyse Juridique (Soumissionnaire)</h3>
                                                <span className="bg-slate-800 text-white text-xs font-bold px-3 py-1 rounded-full flex items-center gap-2">
                                                    <i className="fa-solid fa-book"></i> {scenario.choices[selectedChoice].article}
                                                </span>
                                            </div>
                                            <p className="text-slate-700 text-lg leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                {scenario.choices[selectedChoice].feedback}
                                            </p>
                                            {!scenario.choices[selectedChoice].isCorrect && (
                                                <div className="mt-4 text-red-600 font-bold flex items-center gap-2">
                                                    <i className="fa-solid fa-arrow-trend-down"></i>
                                                    Impact : -{scenario.choices[selectedChoice].penalty} points de viabilité
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {showFeedback && (
                            <div className="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-10">
                                <div className="max-w-4xl mx-auto flex justify-end">
                                    <button 
                                        onClick={nextScenario}
                                        className="px-8 py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold text-lg shadow-lg hover:-translate-y-1 transition-all duration-200 flex items-center gap-3"
                                    >
                                        {currentScenarioIndex < SCENARIO_DATA.length - 1 ? 'Cas suivant' : 'Voir le bilan final'}
                                        <i className="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            const renderEnd = () => {
                const correctAnswers = results.filter(r => r.isCorrect).length;
                let message, icon, color;

                if (score >= 80) {
                    message = "Expert de la Soumission ! Vous maîtrisez parfaitement vos droits et évitez les pièges.";
                    icon = "fa-trophy";
                    color = "text-emerald-500";
                } else if (score >= 50) {
                    message = "Opérateur averti. Quelques risques juridiques pris, mais l'essentiel est là.";
                    icon = "fa-medal";
                    color = "text-blue-500";
                } else {
                    message = "Entreprise en danger. Vos offres risquent d'être rejetées. Une révision du décret s'impose.";
                    icon = "fa-triangle-exclamation";
                    color = "text-red-500";
                }

                return (
                    <div className="max-w-2xl mx-auto p-4 md:p-8 animate-fade-in text-center flex flex-col items-center justify-center min-h-[80vh]">
                        <div className="glass-panel p-10 rounded-3xl shadow-2xl w-full relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-3 bg-slate-800"></div>
                            <i className={`fa-solid ${icon} ${color} text-7xl mb-6 drop-shadow-lg`}></i>
                            <h2 className="text-4xl font-black text-slate-800 mb-2">Bilan de la Simulation</h2>
                            <p className="text-xl text-slate-600 font-medium mb-8">{message}</p>
                            
                            <div className="grid grid-cols-2 gap-4 mb-8">
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                    <div className="text-slate-500 font-bold mb-1 uppercase text-sm">Viabilité de l'Entreprise</div>
                                    <div className={`text-5xl font-black ${score > 70 ? 'text-emerald-600' : score > 40 ? 'text-amber-600' : 'text-red-600'}`}>
                                        {score}%
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                    <div className="text-slate-500 font-bold mb-1 uppercase text-sm">Décisions conformes</div>
                                    <div className="text-5xl font-black text-blue-600">
                                        {correctAnswers}/{SCENARIO_DATA.length}
                                    </div>
                                </div>
                            </div>

                            <div className="flex gap-4 justify-center">
                                <button 
                                    onClick={() => setGameState('home')}
                                    className="px-6 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors"
                                >
                                    Menu Principal
                                </button>
                                <button 
                                    onClick={startSimulation}
                                    className="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold shadow-lg transition-colors"
                                >
                                    Rejouer
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderTeacher = () => {
                const categories = [...new Set(SCENARIO_DATA.map(s => s.category))];

                return (
                    <div className="max-w-5xl mx-auto p-4 md:p-8 animate-fade-in h-[calc(100vh-80px)] flex flex-col">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-3xl font-black text-slate-800">Mode Révision (Soumissionnaire)</h2>
                                <p className="text-slate-500">Base de données des cas jurisprudentiels simulés</p>
                            </div>
                            <button 
                                onClick={() => setGameState('home')}
                                className="px-5 py-2.5 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded-xl font-bold shadow-sm transition-colors flex items-center gap-2"
                            >
                                <i className="fa-solid fa-arrow-left"></i> Retour
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-12 pb-10">
                            {categories.map(cat => (
                                <div key={cat} className="mb-8">
                                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3 border-b-2 border-slate-100 pb-2">
                                        <span className="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center text-sm">
                                            <i className="fa-solid fa-folder-open"></i>
                                        </span>
                                        {cat}
                                    </h3>
                                    <div className="grid gap-4 md:grid-cols-2">
                                        {SCENARIO_DATA.filter(s => s.category === cat).map(scenario => {
                                            const correctChoice = scenario.choices.find(c => c.isCorrect);
                                            return (
                                                <div key={scenario.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                                    <div className="flex justify-between items-start mb-3">
                                                        <h4 className="font-bold text-slate-800 text-lg leading-tight">{scenario.title}</h4>
                                                        <span className="bg-slate-100 text-slate-600 text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider whitespace-nowrap ml-2">
                                                            {correctChoice.article}
                                                        </span>
                                                    </div>
                                                    <p className="text-sm text-slate-600 mb-4 line-clamp-3">{scenario.context}</p>
                                                    <div className="bg-emerald-50 text-emerald-800 p-3 rounded-lg text-sm border border-emerald-100">
                                                        <span className="font-bold block mb-1">Règle applicable :</span>
                                                        {correctChoice.feedback}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col">
                    <header className="bg-white border-b border-slate-200 py-4 px-6 shadow-sm z-20">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-white font-black text-xl">S</div>
                                <div>
                                    <h1 className="font-black text-slate-800 leading-none">Simul-Marchés</h1>
                                    <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest">Soumissionnaire Expert</span>
                                </div>
                            </div>
                            <div className="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">
                                {SCENARIO_DATA.length} Cas Pratiques
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden">
                        {gameState === 'home' && renderHome()}
                        {gameState === 'playing' && renderPlaying()}
                        {gameState === 'end' && renderEnd()}
                        {gameState === 'teacher' && renderTeacher()}
                    </main>

                    <footer className="bg-white py-4 text-center text-slate-400 text-xs border-t border-slate-100">
                        © {new Date().getFullYear()} - Conforme au Décret n°2014-1039 (Parcours Soumissionnaire - v3).
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
